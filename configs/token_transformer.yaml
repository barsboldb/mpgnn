# Sanford-style token transformer — vertices + edges + task token.
# Edges are first-class tokens (not an attention bias), so the model must compute
# reachability itself. No LPE, no SPD: this is the "honest" connectivity setup for
# reproducing the depth-vs-task curve. Connectivity is parallelizable, so accuracy
# is expected to rise with depth (Sanford et al. 2024a, ~log n layers).
#
# Run: python main.py --config configs/token_transformer.yaml --dataset connectedness_hard
# Sweep depth by adding/removing global_attn entries under `layers`.

in_channels: 1        # 1 for connectedness (degree), 2 for isomorphism (one-hot graph id)
out_channels: 2
hidden_channels: 64

tokenization: node_edge
node_id_dim: 16       # per-node identities so edge tokens can name their endpoints
node_id_mode: learned # 'learned' (deterministic, trainable) actually optimizes;
                      # 'random' is permutation-invariant but stalls at chance
lpe_dim: 16            # keep 0 for honest connectivity; turn on for isomorphism

task: graph           # readout is via the task token (pooling field is unused here)
dropout: 0.1
# NOTE: this model always uses pre-norm residual transformer blocks (LayerNorm +
# residual around attention and FFN). The `residual`/`norm_type` config fields apply
# only to the node-token GNN path and are ignored here.

# training
epochs: 500
lr: 0.005
weight_decay: 0.0005
batch_size: 32

# depth sweep: number of entries = number of transformer layers
layers:
  - type: global_attn   # 'type' is required by config validation but ignored by the token model
    heads: 4
  - type: global_attn
    heads: 4
  - type: global_attn
    heads: 4
  - type: global_attn
    heads: 4
