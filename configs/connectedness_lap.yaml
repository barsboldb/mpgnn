# Connectedness_hard with Laplacian eigenvector tokenization.
#
# node_features=lap uses the k smallest *non-trivial* eigenvectors of the
# normalized Laplacian as node features.  Zero eigenvalues (one per connected
# component) are filtered out, so component membership is NOT handed to the
# model as input — the transformer must reason from intra-component geometry.
#
# in_channels must equal lpe_dim (eigenvectors are the features, not appended).
#
# Run: python main.py --config configs/connectedness_lap.yaml --dataset connectedness_hard

in_channels: 8       # = lpe_dim: eigenvector matrix has shape [n, 8]
out_channels: 2
hidden_channels: 4

node_features: lap
lpe_dim: 0           # 0: eigenvectors are features (x), not a separate PE
tokenization: node
input_embedding: linear
norm_type: layer
residual: true

task: graph
pooling: mean
dropout: 0.1

# training
epochs: 300
lr: 0.001
weight_decay: 0.0005
batch_size: 32

layers:
  - type: global_attn
    heads: 4
