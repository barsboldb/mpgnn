# Adjacency-row transformer for graph connectivity.
#
# Each node's token is its row in the adjacency matrix — a binary vector of
# length max_nodes (padded with zeros). This gives every node a structural
# identity derived purely from its neighborhood, with no learned position
# embeddings and no cross-graph parameter sharing.
#
# The transformer attends over these n tokens (one per node) and mean-pools
# the final representations for graph-level classification. No edge tokens,
# no task token — just nodes described by who they're connected to.
#
# Requires dataset variant that sets x = adj_row (padded to max_nodes=24).
# Run: python main.py --config configs/adj_transformer.yaml --dataset connectedness_hard_adj

in_channels: 24       # max_nodes for connectedness_hard — the adj row dimension
out_channels: 2
hidden_channels: 64

tokenization: node    # uses GNN — no edge tokens, no task token
input_embedding: linear  # project adj row (24) -> hidden_channels (64)
norm_type: layer
residual: true
lpe_dim: 0

task: graph
pooling: mean
dropout: 0.1

# training
epochs: 200
lr: 0.001
weight_decay: 0.0005
batch_size: 32

# depth sweep: add/remove entries to change number of transformer layers
layers:
  - type: global_attn
    heads: 4
  - type: global_attn
    heads: 4
  - type: global_attn
    heads: 4
  - type: global_attn
    heads: 4
