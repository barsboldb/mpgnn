# Graph experiment config
# connectedness: python main.py --config config.yaml --dataset connectedness  (in_channels: 1)
# isomorphism:   python main.py --config config.yaml --dataset isomorphism    (in_channels: 2)

in_channels: 1       # 1 for connectedness (degree), 2 for isomorphism (one-hot graph id)
out_channels: 2      # 2 classes for both datasets
lpe_dim: 16
hidden_channels: 1
task: graph
pooling: mean
dropout: 0.5
norm_type: layer
residual: true

# training
epochs: 200
lr: 0.01
weight_decay: 0.0005
batch_size: 32

layers:
  - type: global_attn
    heads: 2

